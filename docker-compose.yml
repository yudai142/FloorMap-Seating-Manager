services:
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      POSTGRES_DB: floormap_development
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -lc "until pg_isready -h db -p 5432 -q; do echo 'waiting for db'; sleep 1; done; bundle exec rails db:create db:migrate || true; rm -f tmp/pids/server.pid; exec ./bin/dev"
    volumes:
      - .:/app:cached
      - bundle:/usr/local/bundle
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
      - "3037:3037"
    environment:
      DATABASE_HOST: db
      DATABASE_URL: postgres://postgres:password@db:5432/floormap_development
      BUNDLE_PATH: /usr/local/bundle
      RAILS_ENV: development
      VITE_HMR_HOST: localhost
      VITE_HMR_PORT: 3037
      VITE_HMR_PROTOCOL: http
    depends_on:
      - db

volumes:
  db_data:
  bundle:
  node_modules:
