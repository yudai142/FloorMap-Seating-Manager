version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      POSTGRES_DB: floormap_development
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -lc "until pg_isready -h db -p 5432 -q; do echo 'waiting for db'; sleep 1; done; bundle exec rails db:create db:migrate || true; npm run build || true; rm -f tmp/pids/server.pid; exec ./bin/rails server -b 0.0.0.0 -p 3000"
    volumes:
      - .:/app:cached
      - bundle:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      DATABASE_HOST: db
      DATABASE_URL: postgres://postgres:password@db:5432/floormap_development
      BUNDLE_PATH: /usr/local/bundle
      RAILS_ENV: development
    depends_on:
      - db

volumes:
  db_data:
  bundle:
