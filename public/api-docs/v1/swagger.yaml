---
openapi: 3.0.1
info:
  title: FloorMap Seating Manager API v1
  description: 座席配置・チェックイン管理システムの REST API
  version: v1.0.0
  contact:
    name: FloorMap Support
    email: support@floormap.local
  license:
    name: MIT
servers:
- url: http://localhost:3000
  description: Development
- url: https://api.floormap.example.com
  description: Production
paths: {}
components:
  schemas:
    Room:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        width:
          type: integer
        height:
          type: integer
        seats:
          type: array
          items:
            "$ref": "#/components/schemas/Seat"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - name
      - width
      - height
    Seat:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
        x:
          type: integer
        "y":
          type: integer
        occupied:
          type: boolean
        occupant_name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - label
      - x
      - "y"
      - occupied
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum:
          - user
          - manager
          - admin
        created_at:
          type: string
          format: date-time
      required:
      - id
      - email
      - name
      - role
    Error:
      type: object
      properties:
        error:
          type: string
        errors:
          type: array
          items:
            type: string
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token for API authentication
