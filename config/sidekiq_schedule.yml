---
# Sidekiq スケジューラ設定

daily_backup:
  cron: '0 2 * * *'  # 毎日 2:00 AM
  class: BackupJob
  description: 'Daily database backup'

backup_cleanup:
  cron: '0 3 * * 0'  # 毎週日曜日 3:00 AM
  class: BackupCleanupJob
  description: 'Clean up old backups (keep last 30 days)'

notification_cleanup:
  cron: '0 4 1 * *'  # 毎月 1 日 4:00 AM
  class: NotificationCleanupJob
  description: 'Clean up old notifications (keep last 90 days)'
